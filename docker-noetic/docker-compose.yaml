name: adi-noetic

services:
  ros-noetic-dev:
    build:
      context: ..
      dockerfile: docker-noetic/Dockerfile
    container_name: adi-noetic-dev
    working_dir: /root/adi_ws
    network_mode: host
    privileged: true
    environment:
      DISPLAY: ${DISPLAY}
      QT_X11_NO_MITSHM: "1"
      ROS_MASTER_URI: ${ROS_MASTER_URI:-http://localhost:11311}
      ROS_HOSTNAME: ${ROS_HOSTNAME:-localhost}
      TZ: Asia/Seoul
    volumes:
      - ${HOME}/adi_ws:/root/adi_ws
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ${HOME}/.Xauthority:/root/.Xauthority:rw
      - /etc/localtime:/etc/localtime:ro
      - /dev:/dev
      - ${HOME}/.ssh:/root/.ssh:ro
    devices:
      - /dev/dri:/dev/dri
    stdin_open: true
    tty: true
    restart: unless-stopped
    command: ["bash", "-lc", "source /opt/ros/noetic/setup.bash && sleep infinity"]